<button (click)="navigateBack()" class="btn btn-ghost">Back to Users</button>

<article class="bg-base-200 p-2 rounded-lg">
  <code>{{ user() | json }}</code>
  <button (click)="navigateToPosts()" class="btn btn-accent">show posts</button>
  <router-outlet></router-outlet>
</article>

<ul>
  @for (n of [1, 2, 3]; track n) {
    <li>
      User {{ n }}, <button (click)="navigateToProfile(n)" class="btn btn-link">Profile</button>
    </li>
  }
</ul>
